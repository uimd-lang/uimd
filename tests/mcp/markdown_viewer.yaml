- name: markdown_viewer
  app: python/examples/markdown_viewer/markdown_viewer.py
  tests:
    - tool: get_element
      arguments:
        element_id: docs
      assert:
        value: ["overview.markdown"]
    - tool: get_element
      arguments:
        element_id: status
      assert:
        value: "overview.markdown - 47 blocks - arrows preview"
    - tool: press_key
      arguments:
        key: Down
    - tool: get_element
      arguments:
        element_id: docs
      assert:
        value: ["styles.markdown"]
    - tool: get_element
      arguments:
        element_id: status
      assert:
        value: "styles.markdown - 46 blocks - arrows preview"
    - tool: press_key
      arguments:
        key: Down
    - tool: get_element
      arguments:
        element_id: docs
      assert:
        value: ["tables.markdown"]
    - tool: get_element
      arguments:
        element_id: status
      assert:
        value: "tables.markdown - 32 blocks - arrows preview"
    - tool: press_key
      arguments:
        key: Down
    - tool: get_element
      arguments:
        element_id: docs
      assert:
        value: ["code.markdown"]
    - tool: get_element
      arguments:
        element_id: status
      assert:
        value: "code.markdown - 29 blocks - arrows preview"
