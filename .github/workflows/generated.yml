name: Generated Sources

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  regenerate-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Regenerate Python UI sources
        run: |
          python3 compile.py python/examples
          python3 compile.py python/dialogs

      - name: Regenerate C++ UI sources
        run: find cpp/dialogs cpp/examples -name '*.md' -exec python3 tools/compile_cpp.py {} \;

      - name: Build C++ examples
        run: |
          cmake -S cpp -B cpp/build
          cmake --build cpp/build --parallel
