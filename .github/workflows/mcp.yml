name: MCP

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  examples:
    runs-on: ubuntu-latest
    env:
      TERM: xterm-256color

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run MCP example scripts
        run: python3 tools/mcp_tester/mcp_tester.py --backend python tests/mcp/all_examples.yaml --exit-on-finish
